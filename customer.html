<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Order Online</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink:#1a1a1a; --amber:#E8A317; --amber-soft:#FEF6E6; --amber-border:#F3C969;
      --bg:#f6f5f3; --card:#ffffff; --line:#ececec; --line2:#f2f2f2; --muted:#8c8c8c; --muted2:#b3b3b3;
      --green:#1e9e57; --red:#dc2626;
      --font:'Segoe UI', system-ui, -apple-system, sans-serif;
      --display:'Playfair Display', Georgia, serif;
      --radius:16px; --shadow:0 1px 3px rgba(0,0,0,0.06);
    }
    * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
    body { font-family:var(--font); background:var(--bg); color:var(--ink); -webkit-font-smoothing:antialiased; }
    .wrap { max-width:660px; margin:0 auto; min-height:100vh; background:var(--bg); position:relative; }
    button { font-family:var(--font); cursor:pointer; border:none; background:none; }
    .hidden { display:none !important; }

    /* Header */
    .hero { background:#1c1c1c; color:#fff; padding:34px 24px 30px; text-align:center; }
    .hero-icon { width:60px; height:60px; border-radius:16px; background:var(--amber); display:flex; align-items:center; justify-content:center; margin:0 auto 16px; font-size:28px; color:#fff; box-shadow:0 6px 20px rgba(232,163,23,0.35); }
    .hero-name { font-family:var(--display); font-size:30px; font-weight:800; letter-spacing:0.01em; }
    .hero-tag { font-size:14px; color:#c9c9c9; margin-top:6px; }
    .hero-addr { font-size:12.5px; color:#8f8f8f; margin-top:8px; }

    /* Menu view */
    .menu-body { padding:22px 20px 120px; }
    .search-wrap { position:relative; margin-bottom:16px; }
    .search-wrap i { position:absolute; left:16px; top:50%; transform:translateY(-50%); color:var(--muted2); font-size:18px; }
    .search { width:100%; padding:14px 16px 14px 44px; border-radius:26px; border:1px solid var(--line); background:#fff; font-size:14px; font-family:var(--font); outline:none; }
    .search:focus { border-color:#ddd; }
    .cats { display:flex; gap:9px; overflow-x:auto; padding-bottom:6px; scrollbar-width:none; }
    .cats::-webkit-scrollbar { display:none; }
    .cat { display:flex; align-items:center; gap:7px; padding:9px 17px; border-radius:22px; border:1px solid var(--line); background:#fff; font-size:13.5px; font-weight:600; color:#444; white-space:nowrap; }
    .cat.active { background:var(--ink); color:#fff; border-color:var(--ink); }
    .menu-label { text-align:center; font-size:11px; font-weight:700; letter-spacing:0.14em; color:var(--muted2); margin:26px 0 16px; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(190px, 1fr)); gap:16px; }
    .card { background:var(--card); border-radius:var(--radius); overflow:hidden; box-shadow:var(--shadow); border:1px solid var(--line2); cursor:pointer; transition:transform 0.12s; }
    .card:active { transform:scale(0.98); }
    .card-img { position:relative; width:100%; aspect-ratio:1.35/1; background:#efece8 center/cover no-repeat; display:flex; align-items:center; justify-content:center; color:#cfcac3; font-size:34px; }
    .card-cust { position:absolute; bottom:8px; right:8px; background:rgba(255,255,255,0.94); backdrop-filter:blur(4px); font-size:11px; font-weight:600; color:#333; padding:4px 10px; border-radius:12px; box-shadow:0 1px 4px rgba(0,0,0,0.1); }
    .card-body { padding:12px 14px 15px; }
    .card-name { font-size:14.5px; font-weight:700; }
    .card-desc { font-size:12px; color:var(--muted); margin-top:2px; line-height:1.35; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .card-price { font-size:15px; font-weight:800; color:var(--amber); margin-top:8px; }
    .empty { text-align:center; color:var(--muted2); padding:50px 20px; font-size:14px; grid-column:1/-1; }
    .empty i { font-size:34px; display:block; margin-bottom:12px; }

    /* Floating cart bar */
    .cartbar { position:fixed; left:50%; transform:translateX(-50%); bottom:18px; width:calc(100% - 40px); max-width:620px; background:var(--ink); color:#fff; border-radius:16px; padding:15px 20px; display:flex; align-items:center; justify-content:space-between; box-shadow:0 10px 30px rgba(0,0,0,0.28); z-index:40; cursor:pointer; }
    .cartbar.hide { display:none; }
    .cartbar-left { display:flex; align-items:center; gap:12px; font-size:15px; font-weight:700; }
    .cartbar-count { background:var(--amber); color:#fff; min-width:24px; height:24px; padding:0 7px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:13px; }
    .cartbar-total { font-size:15px; font-weight:800; }

    /* Sub views (cart / checkout / confirm) */
    .subview { position:fixed; inset:0; background:var(--bg); z-index:60; overflow-y:auto; }
    .subhead { position:sticky; top:0; background:#fff; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:14px; padding:16px 20px; z-index:2; }
    .subhead .back { width:38px; height:38px; border-radius:50%; background:#f2f2f2; display:flex; align-items:center; justify-content:center; font-size:19px; color:#333; }
    .subhead-title { font-family:var(--display); font-size:22px; font-weight:800; flex:1; }
    .subhead-meta { font-size:13px; color:var(--muted); }
    .subbody { max-width:660px; margin:0 auto; padding:20px 20px 130px; }

    .panel { background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow); border:1px solid var(--line2); padding:18px; margin-bottom:16px; }
    .panel-title { font-size:16px; font-weight:800; margin-bottom:14px; }

    /* Cart items */
    .citem { display:flex; align-items:flex-start; gap:12px; padding:14px 0; border-bottom:1px solid var(--line2); }
    .citem:last-child { border-bottom:none; }
    .citem-main { flex:1; min-width:0; }
    .citem-name { font-size:14.5px; font-weight:700; }
    .citem-opts { font-size:12.5px; color:var(--muted); margin-top:2px; }
    .citem-price { font-size:14px; font-weight:800; color:var(--amber); margin-top:6px; }
    .qty { display:flex; align-items:center; gap:6px; flex-shrink:0; }
    .qty-btn { width:32px; height:32px; border-radius:50%; background:#f4f4f4; display:flex; align-items:center; justify-content:center; font-size:17px; color:#333; }
    .qty-btn.del { color:var(--red); }
    .qty-n { min-width:22px; text-align:center; font-size:15px; font-weight:700; }

    .totrow { display:flex; justify-content:space-between; font-size:14px; color:#555; padding:4px 0; }
    .totrow.grand { font-size:17px; font-weight:800; color:var(--ink); border-top:1px solid var(--line); margin-top:8px; padding-top:12px; }

    /* Checkout form */
    .flabel { font-size:12.5px; font-weight:700; color:#555; margin-bottom:6px; display:block; }
    .flabel .req { color:var(--red); }
    .finput, .ftext { width:100%; padding:12px 14px; border-radius:12px; border:1px solid var(--line); background:#fbfbfb; font-size:14px; font-family:var(--font); outline:none; }
    .finput:focus, .ftext:focus { border-color:var(--amber-border); background:#fff; }
    .ftext { resize:vertical; min-height:70px; line-height:1.5; }
    .field { margin-bottom:16px; }
    .field:last-child { margin-bottom:0; }
    .sumline { display:flex; justify-content:space-between; font-size:13.5px; padding:5px 0; }
    .sumline .q { color:var(--muted); font-weight:700; margin-right:5px; }
    .sumline-opts { font-size:11.5px; color:var(--muted2); }

    /* Payment methods */
    .pays { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
    .pay { border:1.5px solid var(--line); border-radius:12px; padding:14px 8px; text-align:center; font-size:13px; font-weight:700; color:#555; display:flex; flex-direction:column; align-items:center; gap:7px; }
    .pay i { font-size:22px; }
    .pay.sel { border-color:var(--amber); background:var(--amber-soft); color:var(--ink); }

    /* Bottom CTA */
    .cta-bar { position:fixed; left:0; right:0; bottom:0; background:linear-gradient(to top, var(--bg) 72%, transparent); padding:14px 20px calc(14px + env(safe-area-inset-bottom)); z-index:3; }
    .cta-inner { max-width:660px; margin:0 auto; }
    .cta { width:100%; padding:17px; border-radius:15px; font-size:15px; font-weight:800; color:#fff; display:flex; align-items:center; justify-content:center; gap:8px; }
    .cta.dark { background:var(--ink); }
    .cta.amber { background:var(--amber); }
    .cta:disabled { opacity:0.45; }

    /* Customise modal */
    .modal-ov { position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:100; display:flex; align-items:center; justify-content:center; padding:16px; opacity:0; pointer-events:none; transition:opacity 0.2s; }
    .modal-ov.show { opacity:1; pointer-events:auto; }
    .modal { background:#fff; border-radius:20px; width:100%; max-width:440px; max-height:88vh; display:flex; flex-direction:column; overflow:hidden; transform:translateY(12px) scale(0.98); transition:transform 0.2s; }
    .modal-ov.show .modal { transform:none; }
    .modal-head { display:flex; align-items:flex-start; justify-content:space-between; padding:20px 22px 14px; }
    .modal-name { font-family:var(--display); font-size:20px; font-weight:800; }
    .modal-price { font-size:15px; font-weight:800; color:var(--amber); margin-top:3px; }
    .modal-x { width:34px; height:34px; border-radius:50%; background:#f2f2f2; display:flex; align-items:center; justify-content:center; font-size:18px; color:#555; flex-shrink:0; }
    .modal-body { overflow-y:auto; padding:0 22px 18px; flex:1; }
    .ogroup { margin-top:18px; }
    .ogroup-head { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
    .ogroup-name { font-size:15px; font-weight:800; }
    .req-badge { font-size:10px; font-weight:700; color:var(--red); background:#fef2f2; padding:2px 8px; border-radius:10px; }
    .opt { display:flex; align-items:center; gap:12px; padding:12px 14px; border:1.5px solid transparent; border-radius:12px; margin-bottom:4px; }
    .opt.sel { border-color:var(--amber-border); background:var(--amber-soft); }
    .opt-radio { width:20px; height:20px; border-radius:50%; border:2px solid #ccc; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
    .opt.sel .opt-radio { border-color:var(--amber); }
    .opt.sel .opt-radio::after { content:''; width:10px; height:10px; border-radius:50%; background:var(--amber); }
    .opt-check { width:20px; height:20px; border-radius:6px; border:2px solid #ccc; flex-shrink:0; display:flex; align-items:center; justify-content:center; color:#fff; font-size:13px; }
    .opt.sel .opt-check { border-color:var(--amber); background:var(--amber); }
    .opt-label { flex:1; font-size:14px; font-weight:500; }
    .opt-delta { font-size:13px; font-weight:700; color:var(--amber); }
    .modal-foot { padding:14px 20px 20px; border-top:1px solid var(--line2); }

    /* Confirmation */
    .confirm-wrap { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:40px 24px; }
    .confirm-check { width:88px; height:88px; border-radius:50%; background:var(--green); color:#fff; display:flex; align-items:center; justify-content:center; font-size:46px; margin-bottom:22px; }
    .confirm-title { font-family:var(--display); font-size:28px; font-weight:800; }
    .confirm-sub { font-size:14.5px; color:var(--muted); margin-top:10px; line-height:1.5; max-width:340px; }
    .confirm-num { margin-top:20px; font-size:13px; color:var(--muted); }
    .confirm-num b { font-size:22px; color:var(--ink); display:block; margin-top:2px; font-weight:800; }
    .confirm-btn { margin-top:32px; padding:15px 34px; border-radius:14px; background:var(--ink); color:#fff; font-size:15px; font-weight:700; }

    .loading { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; color:var(--muted); gap:14px; }
    .spin { width:34px; height:34px; border:3px solid var(--line); border-top-color:var(--amber); border-radius:50%; animation:sp 0.8s linear infinite; }
    @keyframes sp { to { transform:rotate(360deg); } }
    .toast { position:fixed; bottom:90px; left:50%; transform:translateX(-50%) translateY(20px); background:#111; color:#fff; padding:12px 20px; border-radius:24px; font-size:13.5px; font-weight:600; opacity:0; pointer-events:none; transition:all 0.25s; z-index:200; white-space:nowrap; }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  </style>
</head>
<body>
  <div class="wrap">
    <!-- Loading -->
    <div class="loading" id="loadingView">
      <div class="spin"></div>
      <div>Loading menu…</div>
    </div>

    <!-- MENU VIEW -->
    <div id="menuView" class="hidden">
      <div class="hero">
        <div class="hero-icon"><i class="ti ti-shopping-bag"></i></div>
        <div class="hero-name" id="bizName">Café</div>
        <div class="hero-tag" id="bizTag"></div>
        <div class="hero-addr" id="bizAddr"></div>
      </div>
      <div class="menu-body">
        <div class="search-wrap">
          <i class="ti ti-search"></i>
          <input class="search" id="searchInput" placeholder="Search menu…" oninput="onSearch(this.value)" />
        </div>
        <div class="cats" id="cats"></div>
        <div class="menu-label">OUR MENU</div>
        <div class="grid" id="grid"></div>
      </div>
      <div class="cartbar hide" id="cartBar" onclick="showCart()">
        <div class="cartbar-left"><span class="cartbar-count" id="cartCount">0</span> View cart</div>
        <div class="cartbar-total" id="cartBarTotal">$0.00</div>
      </div>
    </div>

    <!-- CART VIEW -->
    <div id="cartView" class="subview hidden">
      <div class="subhead">
        <button class="back" onclick="showMenu()"><i class="ti ti-chevron-left"></i></button>
        <div class="subhead-title">Your Cart</div>
        <div class="subhead-meta" id="cartMeta">0 items</div>
      </div>
      <div class="subbody">
        <div class="panel" id="cartItems"></div>
        <div class="panel" id="cartTotals"></div>
      </div>
      <div class="cta-bar">
        <div class="cta-inner">
          <button class="cta dark" id="toCheckoutBtn" onclick="showCheckout()">Proceed to Checkout → <span id="cartCtaTotal">$0.00</span></button>
        </div>
      </div>
    </div>

    <!-- CHECKOUT VIEW -->
    <div id="checkoutView" class="subview hidden">
      <div class="subhead">
        <button class="back" onclick="showCart()"><i class="ti ti-chevron-left"></i></button>
        <div class="subhead-title">Checkout</div>
      </div>
      <div class="subbody">
        <div class="panel">
          <div class="panel-title">Your details</div>
          <div class="field">
            <label class="flabel">Name <span class="req">*</span></label>
            <input class="finput" id="custName" placeholder="e.g. John" oninput="updatePlaceBtn()" />
          </div>
          <div class="field">
            <label class="flabel">Special instructions</label>
            <textarea class="ftext" id="custNotes" placeholder="Allergies, preferences…"></textarea>
          </div>
        </div>
        <div class="panel">
          <div class="panel-title">Payment method</div>
          <div class="pays" id="pays">
            <div class="pay" data-pay="Cash" onclick="selectPay('Cash')"><i class="ti ti-cash"></i> Cash</div>
            <div class="pay" data-pay="Card" onclick="selectPay('Card')"><i class="ti ti-credit-card"></i> Card</div>
            <div class="pay" data-pay="PayNow" onclick="selectPay('PayNow')"><i class="ti ti-qrcode"></i> PayNow</div>
          </div>
        </div>
        <div class="panel">
          <div class="panel-title">Order summary</div>
          <div id="coSummary"></div>
          <div id="coTotals" style="margin-top:12px;"></div>
        </div>
      </div>
      <div class="cta-bar">
        <div class="cta-inner">
          <button class="cta amber" id="placeBtn" onclick="placeOrder()" disabled>Place Order • <span id="coCtaTotal">$0.00</span></button>
        </div>
      </div>
    </div>

    <!-- CONFIRMATION VIEW -->
    <div id="confirmView" class="subview hidden">
      <div class="confirm-wrap">
        <div class="confirm-check"><i class="ti ti-check"></i></div>
        <div class="confirm-title">Order placed!</div>
        <div class="confirm-sub">Thanks<span id="confName"></span> — your order has been sent to the counter. It'll be prepared once the staff confirm it.</div>
        <div class="confirm-num">Order number <b id="confNum">#—</b></div>
        <button class="confirm-btn" onclick="resetToMenu()">Start a new order</button>
      </div>
    </div>

    <!-- CUSTOMISE MODAL -->
    <div class="modal-ov" id="custModal" onclick="if(event.target===this)closeCust()">
      <div class="modal">
        <div class="modal-head">
          <div>
            <div class="modal-name" id="mName">Item</div>
            <div class="modal-price" id="mPrice">$0.00</div>
          </div>
          <button class="modal-x" onclick="closeCust()"><i class="ti ti-x"></i></button>
        </div>
        <div class="modal-body" id="mBody"></div>
        <div class="modal-foot">
          <button class="cta dark" onclick="addFromModal()">Add to Cart • <span id="mAddTotal">$0.00</span></button>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>

    // ── State ──
    let BIZ = {};
    let PRODUCTS = [];              // flat list of {id,name,price,category,description,image}
    let OPTIONS = {};              // by category -> { groups:[{key,label,type,required,choices:[{label,delta,default}]}] }
    let cart = [];                 // {uid,name,base,unit,qty,options:[{group,choice,delta}],optLabel}
    let activeCat = 'All Items';
    let searchQ = '';
    let selectedPay = null;
    // modal working state
    let mProduct = null, mOpts = null, mSel = {};

    function money(n) { return '$' + (Math.round(n * 100) / 100).toFixed(2); }
    function esc(s) { return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function toast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 2200); }

    // ── Init ──
    async function init() {
      try {
        if (window.supabase && window.supabase.createClient) db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      } catch (e) { console.error(e); }
      if (!db) { showLoadError('Could not connect. Please try again.'); return; }
      await loadAll();
      document.getElementById('loadingView').classList.add('hidden');
      document.getElementById('menuView').classList.remove('hidden');
      renderBiz(); renderCats(); renderGrid();
    }

    function showLoadError(msg) {
      document.getElementById('loadingView').innerHTML =
        '<i class="ti ti-wifi-off" style="font-size:40px;color:#ccc"></i><div>' + esc(msg) + '</div>';
    }

    async function loadAll() {
      // business info
      try {
        const { data: biz } = await db.from('business_info').select('*').limit(1).maybeSingle();
        BIZ = biz || {};
      } catch (e) { BIZ = {}; }
      // products
      try {
        const { data: prods } = await db.from('products').select('*').order('id', { ascending: true });
        PRODUCTS = (prods || []).map(r => ({
          id: r.id, name: r.name, price: parseFloat(r.price) || 0, category: r.category || 'Other',
          description: r.description || '', image: r.image || PRODUCT_IMGS[r.name] || ''
        }));
      } catch (e) { PRODUCTS = []; }
      // options
      try {
        const { data: groups } = await db.from('option_groups').select('*').order('sort_order', { ascending: true });
        const { data: choices } = await db.from('option_choices').select('*').order('sort_order', { ascending: true });
        const byCat = {};
        (groups || []).forEach(g => {
          if (!byCat[g.category]) byCat[g.category] = { groups: [] };
          byCat[g.category].groups.push({
            key: g.key, label: g.label, type: g.type, required: !!g.required,
            choices: (choices || []).filter(c => c.group_id === g.id).map(c => ({
              label: c.label, delta: parseFloat(c.delta) || 0, default: !!c.is_default
            }))
          });
        });
        OPTIONS = byCat;
      } catch (e) { OPTIONS = {}; }
    }

    function optionsFor(category) {
      if (!CUSTOMIZABLE_CATEGORIES.includes(category)) return null;
      const o = OPTIONS[category];
      if (o && o.groups && o.groups.length) return o;
      return null;
    }

    // ── Render menu ──
    function renderBiz() {
      document.getElementById('bizName').textContent = BIZ.name || 'Our Café';
      document.getElementById('bizTag').textContent = BIZ.tagline || '';
      document.getElementById('bizAddr').textContent = BIZ.address || '';
      document.title = (BIZ.name || 'Order') + ' — Order Online';
    }

    function categories() {
      const cats = ['All Items'];
      PRODUCTS.forEach(p => { if (p.category && !cats.includes(p.category)) cats.push(p.category); });
      return cats;
    }

    function catIcon(cat) {
      const c = (cat || '').toLowerCase();
      if (c.includes('hot')) return 'ti-coffee';
      if (c.includes('cold')) return 'ti-cup';
      if (c.includes('pastr') || c.includes('bak')) return 'ti-bread';
      if (c.includes('merch')) return 'ti-shirt';
      if (c.includes('bundle')) return 'ti-package';
      return 'ti-tag';
    }

    function renderCats() {
      const el = document.getElementById('cats');
      el.innerHTML = categories().map(c =>
        `<button class="cat ${c === activeCat ? 'active' : ''}" onclick="setCat('${esc(c).replace(/'/g,"\\'")}')">
           ${c === 'All Items' ? '<i class="ti ti-sparkles"></i>' : '<i class="ti ' + catIcon(c) + '"></i>'} ${esc(c)}
         </button>`).join('');
    }
    function setCat(c) { activeCat = c; renderCats(); renderGrid(); }
    function onSearch(v) { searchQ = (v || '').toLowerCase().trim(); renderGrid(); }

    function visibleProducts() {
      let list = activeCat === 'All Items' ? PRODUCTS : PRODUCTS.filter(p => p.category === activeCat);
      if (searchQ) list = list.filter(p => p.name.toLowerCase().includes(searchQ));
      return list;
    }

    function renderGrid() {
      const el = document.getElementById('grid');
      const list = visibleProducts();
      if (!list.length) { el.innerHTML = '<div class="empty"><i class="ti ti-search-off"></i>No items found.</div>'; return; }
      el.innerHTML = list.map(p => {
        const cust = optionsFor(p.category) ? '<div class="card-cust">Customise</div>' : '';
        const img = p.image
          ? `<div class="card-img" style="background-image:url('${esc(p.image)}')">${cust}</div>`
          : `<div class="card-img"><i class="ti ti-cup"></i>${cust}</div>`;
        return `<div class="card" onclick="openItem(${p.id})">
          ${img}
          <div class="card-body">
            <div class="card-name">${esc(p.name)}</div>
            ${p.description ? `<div class="card-desc">${esc(p.description)}</div>` : ''}
            <div class="card-price">${money(p.price)}</div>
          </div>
        </div>`;
      }).join('');
    }

    // ── Item / customise ──
    function openItem(id) {
      const p = PRODUCTS.find(x => x.id === id);
      if (!p) return;
      const opts = optionsFor(p.category);
      if (!opts) { addToCart(p, [], p.price); toast('Added to cart'); return; }
      mProduct = p; mOpts = opts; mSel = {};
      opts.groups.forEach(g => {
        if (g.type === 'multi') mSel[g.key] = new Set();
        else mSel[g.key] = (g.choices.find(c => c.default) || g.choices[0] || {}).label;
      });
      document.getElementById('mName').textContent = p.name;
      renderModal();
      document.getElementById('custModal').classList.add('show');
    }
    function closeCust() { document.getElementById('custModal').classList.remove('show'); }

    function modalUnit() {
      let sum = mProduct.price;
      mOpts.groups.forEach(g => {
        if (g.type === 'multi') { mSel[g.key].forEach(lbl => { const c = g.choices.find(x => x.label === lbl); if (c) sum += c.delta; }); }
        else { const c = g.choices.find(x => x.label === mSel[g.key]); if (c) sum += c.delta; }
      });
      return sum;
    }

    function renderModal() {
      document.getElementById('mPrice').textContent = money(mProduct.price);
      const body = mOpts.groups.map(g => {
        const rows = g.choices.map(c => {
          const on = g.type === 'multi' ? mSel[g.key].has(c.label) : mSel[g.key] === c.label;
          const control = g.type === 'multi'
            ? `<span class="opt-check">${on ? '<i class="ti ti-check"></i>' : ''}</span>`
            : `<span class="opt-radio"></span>`;
          return `<div class="opt ${on ? 'sel' : ''}" onclick="pick('${g.key}','${esc(c.label).replace(/'/g,"\\'")}','${g.type}')">
            ${control}
            <span class="opt-label">${esc(c.label)}</span>
            ${c.delta ? `<span class="opt-delta">+${money(c.delta).slice(1)}</span>` : ''}
          </div>`;
        }).join('');
        return `<div class="ogroup">
          <div class="ogroup-head"><span class="ogroup-name">${esc(g.label)}</span>${g.required ? '<span class="req-badge">Required</span>' : ''}</div>
          ${rows}
        </div>`;
      }).join('');
      document.getElementById('mBody').innerHTML = body;
      document.getElementById('mAddTotal').textContent = money(modalUnit());
    }

    function pick(key, label, type) {
      if (type === 'multi') { const s = mSel[key]; if (s.has(label)) s.delete(label); else s.add(label); }
      else mSel[key] = label;
      renderModal();
    }

    function addFromModal() {
      const options = [];
      mOpts.groups.forEach(g => {
        if (g.type === 'multi') { mSel[g.key].forEach(lbl => { const c = g.choices.find(x => x.label === lbl); options.push({ group: g.label, choice: lbl, delta: c ? c.delta : 0 }); }); }
        else { const c = g.choices.find(x => x.label === mSel[g.key]); if (c) options.push({ group: g.label, choice: c.label, delta: c.delta }); }
      });
      addToCart(mProduct, options, modalUnit());
      closeCust();
      toast('Added to cart');
    }

    function addToCart(p, options, unit) {
      const optLabel = options.filter(o => o.choice).map(o => o.choice).join(' • ');
      const key = p.id + '|' + options.map(o => o.group + ':' + o.choice).join(',');
      const existing = cart.find(c => c.key === key);
      if (existing) existing.qty += 1;
      else cart.push({ uid: Date.now() + Math.random(), key, name: p.name, base: p.price, unit, qty: 1, options, optLabel });
      updateCartBar();
    }

    function cartSubtotal() { return cart.reduce((s, c) => s + c.unit * c.qty, 0); }
    function cartCount() { return cart.reduce((s, c) => s + c.qty, 0); }

    function updateCartBar() {
      const bar = document.getElementById('cartBar');
      const n = cartCount();
      if (n === 0) { bar.classList.add('hide'); return; }
      bar.classList.remove('hide');
      document.getElementById('cartCount').textContent = n;
      document.getElementById('cartBarTotal').textContent = money(cartSubtotal() * (1 + TAX_RATE));
    }

    // ── Cart view ──
    function showMenu() { document.getElementById('cartView').classList.add('hidden'); document.getElementById('checkoutView').classList.add('hidden'); }
    function showCart() {
      if (cart.length === 0) { toast('Your cart is empty'); return; }
      document.getElementById('checkoutView').classList.add('hidden');
      renderCart();
      document.getElementById('cartView').classList.remove('hidden');
    }

    function renderCart() {
      document.getElementById('cartMeta').textContent = cartCount() + (cartCount() === 1 ? ' item' : ' items');
      document.getElementById('cartItems').innerHTML = cart.map(c => `
        <div class="citem">
          <div class="citem-main">
            <div class="citem-name">${esc(c.name)}</div>
            ${c.optLabel ? `<div class="citem-opts">${esc(c.optLabel)}</div>` : ''}
            <div class="citem-price">${money(c.unit * c.qty)}</div>
          </div>
          <div class="qty">
            <button class="qty-btn ${c.qty === 1 ? 'del' : ''}" onclick="changeQty('${c.uid}',-1)"><i class="ti ${c.qty === 1 ? 'ti-trash' : 'ti-minus'}"></i></button>
            <span class="qty-n">${c.qty}</span>
            <button class="qty-btn" onclick="changeQty('${c.uid}',1)"><i class="ti ti-plus"></i></button>
          </div>
        </div>`).join('');
      const sub = cartSubtotal(), tax = sub * TAX_RATE;
      document.getElementById('cartTotals').innerHTML = `
        <div class="totrow"><span>Subtotal</span><span>${money(sub)}</span></div>
        <div class="totrow"><span>GST (9%)</span><span>${money(tax)}</span></div>
        <div class="totrow grand"><span>Total</span><span>${money(sub + tax)}</span></div>`;
      document.getElementById('cartCtaTotal').textContent = money(sub + tax);
    }

    function changeQty(uid, d) {
      const c = cart.find(x => String(x.uid) === String(uid));
      if (!c) return;
      c.qty += d;
      if (c.qty <= 0) cart = cart.filter(x => String(x.uid) !== String(uid));
      updateCartBar();
      if (cart.length === 0) { showMenu(); return; }
      renderCart();
    }

    // ── Checkout ──
    function showCheckout() {
      renderCheckout();
      updatePlaceBtn();
      document.getElementById('checkoutView').classList.remove('hidden');
    }
    function renderCheckout() {
      const sub = cartSubtotal(), tax = sub * TAX_RATE;
      document.getElementById('coSummary').innerHTML = cart.map(c => `
        <div class="sumline"><span><span class="q">${c.qty}×</span>${esc(c.name)}${c.optLabel ? `<div class="sumline-opts">${esc(c.optLabel)}</div>` : ''}</span><span>${money(c.unit * c.qty)}</span></div>`).join('');
      document.getElementById('coTotals').innerHTML = `
        <div class="totrow"><span>Subtotal</span><span>${money(sub)}</span></div>
        <div class="totrow"><span>GST (9%)</span><span>${money(tax)}</span></div>
        <div class="totrow grand"><span>Total</span><span>${money(sub + tax)}</span></div>`;
      document.getElementById('coCtaTotal').textContent = money(sub + tax);
    }
    function selectPay(m) {
      selectedPay = m;
      document.querySelectorAll('#pays .pay').forEach(p => p.classList.toggle('sel', p.dataset.pay === m));
      updatePlaceBtn();
    }
    function updatePlaceBtn() {
      const name = (document.getElementById('custName').value || '').trim();
      document.getElementById('placeBtn').disabled = !(name && selectedPay && cart.length);
    }

    async function placeOrder() {
      const name = (document.getElementById('custName').value || '').trim();
      const notes = (document.getElementById('custNotes').value || '').trim();
      if (!name) { toast('Please enter your name'); return; }
      if (!selectedPay) { toast('Please choose a payment method'); return; }
      const btn = document.getElementById('placeBtn'); btn.disabled = true;

      const sub = cartSubtotal(), tax = sub * TAX_RATE, total = sub + tax;
      const items = cart.map(c => ({ name: c.name, qty: c.qty, unit_price: c.unit, line_total: c.unit * c.qty, options: c.options, options_label: c.optLabel }));
      const row = {
        customer_name: name, special_instructions: notes || null,
        items, subtotal: sub, tax, total, payment_method: selectedPay,
        status: 'pending', outlet_id: (BIZ.default_outlet_id != null ? BIZ.default_outlet_id : null)
      };

      try {
        const { data, error } = await db.from('customer_orders').insert(row).select().single();
        if (error) throw error;
        const num = data.order_number || ('#' + (1000 + data.id));
        if (!data.order_number) { try { await db.from('customer_orders').update({ order_number: num }).eq('id', data.id); } catch (e) {} }
        showConfirm(name, num);
      } catch (e) {
        console.error('placeOrder error:', e);
        toast('Could not place order: ' + (e.message || 'try again'));
        btn.disabled = false;
      }
    }

    function showConfirm(name, num) {
      document.getElementById('confName').textContent = name ? (', ' + name) : '';
      document.getElementById('confNum').textContent = num;
      document.getElementById('confirmView').classList.remove('hidden');
    }
    function resetToMenu() {
      cart = []; selectedPay = null; searchQ = ''; activeCat = 'All Items';
      document.getElementById('custName').value = '';
      document.getElementById('custNotes').value = '';
      document.getElementById('searchInput').value = '';
      document.querySelectorAll('#pays .pay').forEach(p => p.classList.remove('sel'));
      updateCartBar();
      document.getElementById('confirmView').classList.add('hidden');
      document.getElementById('checkoutView').classList.add('hidden');
      document.getElementById('cartView').classList.add('hidden');
      renderCats(); renderGrid();
      window.scrollTo(0, 0);
    }

    init();
  </script>
</body>
</html>
